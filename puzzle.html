<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自由拼图 - 防彦美老年痴呆训练</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        .header {
            text-align: center;
            margin-bottom: 30px;
        }
        .header h1 {
            color: white;
            font-size: 32px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        .back-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            background: white;
            color: #f5576c;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }
        .back-btn:hover {
            transform: scale(1.05);
        }
        .setup-panel {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 600px;
            margin: 0 auto;
        }
        .setup-panel h2 {
            color: #333;
            margin-bottom: 30px;
        }
        .upload-area {
            border: 3px dashed #f5576c;
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 30px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .upload-area:hover {
            background: #fff5f7;
        }
        .upload-area p {
            color: #666;
            font-size: 18px;
        }
        .upload-area input {
            display: none;
        }
        .preview-img {
            max-width: 100%;
            max-height: 300px;
            border-radius: 10px;
            margin-top: 20px;
            display: none;
        }
        .options {
            margin-bottom: 30px;
        }
        .options label {
            display: block;
            color: #333;
            font-size: 18px;
            margin-bottom: 15px;
        }
        .piece-options {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }
        .piece-btn {
            padding: 12px 25px;
            border: 2px solid #f5576c;
            background: white;
            color: #f5576c;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        .piece-btn:hover, .piece-btn.active {
            background: #f5576c;
            color: white;
        }
        .start-btn {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 15px 50px;
            border: none;
            border-radius: 30px;
            font-size: 20px;
            cursor: pointer;
            box-shadow: 0 5px 20px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }
        .start-btn:hover {
            transform: scale(1.05);
        }
        .start-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .game-area {
            display: none;
            text-align: center;
        }
        .game-header {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .game-btn {
            background: white;
            color: #f5576c;
            padding: 10px 25px;
            border: none;
            border-radius: 20px;
            font-size: 16px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: all 0.3s;
        }
        .game-btn:hover {
            transform: scale(1.05);
        }
        .timer {
            color: white;
            font-size: 24px;
            font-weight: bold;
        }
        .puzzle-container {
            display: flex;
            justify-content: center;
            gap: 40px;
            flex-wrap: wrap;
        }
        .puzzle-board {
            background: white;
            border-radius: 15px;
            padding: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            display: grid;
            gap: 2px;
        }
        .puzzle-piece {
            background-size: cover;
            cursor: pointer;
            border: 1px solid #ddd;
            transition: transform 0.2s;
        }
        .puzzle-piece:hover {
            transform: scale(1.05);
            z-index: 10;
        }
        .puzzle-piece.selected {
            box-shadow: 0 0 0 3px #f5576c;
            transform: scale(1.1);
            z-index: 100;
        }
        .preview-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            justify-content: center;
            align-items: center;
            z-index: 1001;
        }
        .preview-modal img {
            max-width: 90%;
            max-height: 90%;
            border-radius: 10px;
        }
        .preview-modal .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: white;
            color: #f5576c;
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            font-weight: bold;
        }
        .success-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .success-content {
            background: white;
            padding: 50px;
            border-radius: 20px;
            text-align: center;
            animation: popIn 0.5s;
        }
        @keyframes popIn {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }
        .success-content h2 {
            color: #f5576c;
            font-size: 36px;
            margin-bottom: 20px;
        }
        .success-content p {
            color: #666;
            font-size: 18px;
            margin-bottom: 30px;
        }
        .success-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← 返回主页</a>
    <div class="container">
        <div class="header">
            <h1>🧩 自由拼图</h1>
        </div>
        <div class="setup-panel" id="setupPanel">
            <h2>开始拼图前，请先设置</h2>
            <div class="upload-area" id="uploadArea">
                <p>📷 点击此处上传图片</p>
                <input type="file" id="imageInput" accept="image/*">
                <img id="previewImg" class="preview-img">
            </div>
            <div class="options">
                <label>选择拼图分片数量：</label>
                <div class="piece-options">
                    <button class="piece-btn" data-pieces="16">16片</button>
                    <button class="piece-btn" data-pieces="32">32片</button>
                    <button class="piece-btn" data-pieces="64">64片</button>
                    <button class="piece-btn" data-pieces="128">128片</button>
                </div>
            </div>
            <button class="start-btn" id="startBtn" disabled>开始拼图</button>
        </div>
        <div class="game-area" id="gameArea">
            <div class="game-header">
                <div class="timer">⏱️ <span id="timerDisplay">00:00</span></div>
                <button class="game-btn" id="viewPreviewBtn">👁️ 查看原图</button>
                <button class="game-btn" id="resetBtn">重新开始</button>
                <button class="game-btn" id="newImageBtn">上传新图片</button>
            </div>
            <div class="puzzle-container">
                <div class="puzzle-board" id="puzzleBoard"></div>
            </div>
        </div>
    </div>
    <div class="preview-modal" id="previewModal">
        <button class="close-btn" id="closePreviewBtn">×</button>
        <img id="gamePreview">
    </div>
    <div class="success-modal" id="successModal">
        <div class="success-content">
            <h2>🎉 恭喜完成！</h2>
            <p>用时：<span id="finalTime"></span></p>
            <div class="success-buttons">
                <button class="game-btn" id="playAgainBtn">再玩一次</button>
                <button class="game-btn" id="newImageModalBtn">上传新图片</button>
            </div>
        </div>
    </div>
    <script>
        let uploadedImage = null;
        let selectedPieces = null;
        let gridSize = 4;
        let pieces = [];
        let selectedPiece = null;
        let timerInterval = null;
        let seconds = 0;
        const uploadArea = document.getElementById('uploadArea');
        const imageInput = document.getElementById('imageInput');
        const previewImg = document.getElementById('previewImg');
        const pieceBtns = document.querySelectorAll('.piece-btn');
        const startBtn = document.getElementById('startBtn');
        const setupPanel = document.getElementById('setupPanel');
        const gameArea = document.getElementById('gameArea');
        const puzzleBoard = document.getElementById('puzzleBoard');
        const gamePreview = document.getElementById('gamePreview');
        const timerDisplay = document.getElementById('timerDisplay');
        const resetBtn = document.getElementById('resetBtn');
        const newImageBtn = document.getElementById('newImageBtn');
        const viewPreviewBtn = document.getElementById('viewPreviewBtn');
        const closePreviewBtn = document.getElementById('closePreviewBtn');
        const previewModal = document.getElementById('previewModal');
        const successModal = document.getElementById('successModal');
        const finalTime = document.getElementById('finalTime');
        const playAgainBtn = document.getElementById('playAgainBtn');
        const newImageModalBtn = document.getElementById('newImageModalBtn');
        uploadArea.addEventListener('click', () => imageInput.click());
        imageInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    uploadedImage = event.target.result;
                    previewImg.src = uploadedImage;
                    previewImg.style.display = 'block';
                    checkCanStart();
                };
                reader.readAsDataURL(file);
            }
        });
        pieceBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                pieceBtns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                selectedPieces = parseInt(btn.dataset.pieces);
                checkCanStart();
            });
        });
        function checkCanStart() {
            startBtn.disabled = !(uploadedImage && selectedPieces);
        }
        startBtn.addEventListener('click', startGame);
        function startGame() {
            const sqrt = Math.sqrt(selectedPieces);
            gridSize = Math.floor(sqrt);
            if (gridSize * gridSize !== selectedPieces) {
                gridSize = selectedPieces / 4;
            }
            setupPanel.style.display = 'none';
            gameArea.style.display = 'block';
            gamePreview.src = uploadedImage;
            seconds = 0;
            timerDisplay.textContent = '00:00';
            startTimer();
            createPuzzle();
        }
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                seconds++;
                const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
                const secs = (seconds % 60).toString().padStart(2, '0');
                timerDisplay.textContent = `${mins}:${secs}`;
            }, 1000);
        }
        function createPuzzle() {
            puzzleBoard.innerHTML = '';
            const boardSize = Math.min(500, window.innerWidth - 300);
            const pieceSize = boardSize / gridSize;
            puzzleBoard.style.gridTemplateColumns = `repeat(${gridSize}, ${pieceSize}px)`;
            puzzleBoard.style.width = `${boardSize + gridSize * 2}px`;
            pieces = [];
            for (let i = 0; i < selectedPieces; i++) {
                pieces.push(i);
            }
            shuffleArray(pieces);
            pieces.forEach((originalIndex, currentIndex) => {
                const piece = document.createElement('div');
                piece.className = 'puzzle-piece';
                piece.style.width = `${pieceSize}px`;
                piece.style.height = `${pieceSize}px`;
                piece.style.backgroundImage = `url(${uploadedImage})`;
                piece.style.backgroundSize = `${boardSize}px ${boardSize}px`;
                const row = Math.floor(originalIndex / gridSize);
                const col = originalIndex % gridSize;
                piece.style.backgroundPosition = `-${col * pieceSize}px -${row * pieceSize}px`;
                piece.dataset.originalIndex = originalIndex;
                piece.dataset.currentIndex = currentIndex;
                piece.addEventListener('click', () => selectPiece(piece));
                puzzleBoard.appendChild(piece);
            });
        }
        function shuffleArray(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
        }
        function selectPiece(piece) {
            if (selectedPiece === null) {
                selectedPiece = piece;
                piece.classList.add('selected');
            } else {
                swapPieces(selectedPiece, piece);
                selectedPiece.classList.remove('selected');
                selectedPiece = null;
                checkWin();
            }
        }
        function swapPieces(piece1, piece2) {
            const tempBgPos = piece1.style.backgroundPosition;
            const tempOriginalIndex = piece1.dataset.originalIndex;
            piece1.style.backgroundPosition = piece2.style.backgroundPosition;
            piece1.dataset.originalIndex = piece2.dataset.originalIndex;
            piece2.style.backgroundPosition = tempBgPos;
            piece2.dataset.originalIndex = tempOriginalIndex;
        }
        function checkWin() {
            const allPieces = puzzleBoard.querySelectorAll('.puzzle-piece');
            for (let i = 0; i < allPieces.length; i++) {
                if (parseInt(allPieces[i].dataset.originalIndex) !== i) {
                    return;
                }
            }
            clearInterval(timerInterval);
            const mins = Math.floor(seconds / 60).toString().padStart(2, '0');
            const secs = (seconds % 60).toString().padStart(2, '0');
            finalTime.textContent = `${mins}:${secs}`;
            successModal.style.display = 'flex';
        }
        viewPreviewBtn.addEventListener('click', () => {
            previewModal.style.display = 'flex';
        });
        closePreviewBtn.addEventListener('click', () => {
            previewModal.style.display = 'none';
        });
        previewModal.addEventListener('click', (e) => {
            if (e.target === previewModal) {
                previewModal.style.display = 'none';
            }
        });
        resetBtn.addEventListener('click', () => {
            createPuzzle();
            seconds = 0;
            timerDisplay.textContent = '00:00';
            startTimer();
        });
        newImageBtn.addEventListener('click', resetToSetup);
        playAgainBtn.addEventListener('click', () => {
            successModal.style.display = 'none';
            createPuzzle();
            seconds = 0;
            timerDisplay.textContent = '00:00';
            startTimer();
        });
        newImageModalBtn.addEventListener('click', () => {
            successModal.style.display = 'none';
            resetToSetup();
        });
        function resetToSetup() {
            clearInterval(timerInterval);
            uploadedImage = null;
            selectedPieces = null;
            pieceBtns.forEach(b => b.classList.remove('active'));
            imageInput.value = '';
            previewImg.style.display = 'none';
            startBtn.disabled = true;
            gameArea.style.display = 'none';
            setupPanel.style.display = 'block';
        }
    </script>
</body>
</html>
