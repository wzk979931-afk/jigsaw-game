<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>防彦美老年痴呆训练</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
</head>
<body class="bg-blue-50 min-h-screen font-sans">
    <div id="app" class="container mx-auto px-4 py-8">
        <!-- Main Menu -->
        <div id="main-menu" class="text-center">
            <h1 class="text-4xl md:text-6xl font-bold text-blue-800 mb-8 animate__animated animate__fadeInDown">防彦美老年痴呆训练</h1>
            <p class="text-lg text-blue-600 mb-12">选择一个游戏开始训练吧！</p>
            
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                <!-- Game 1: Jigsaw Puzzle -->
                <div onclick="showGame('puzzle')" class="bg-white rounded-2xl shadow-xl p-8 cursor-pointer transform transition hover:scale-105 hover:shadow-2xl animate__animated animate__zoomIn">
                    <div class="text-5xl mb-4">🧩</div>
                    <h2 class="text-2xl font-bold text-blue-700 mb-2">自由拼图</h2>
                    <p class="text-gray-600">上传你喜欢的图片，挑战你的记忆力和观察力。</p>
                </div>

                <!-- Game 2: Stone Match -->
                <div onclick="showGame('stone')" class="bg-white rounded-2xl shadow-xl p-8 cursor-pointer transform transition hover:scale-105 hover:shadow-2xl animate__animated animate__zoomIn" style="animation-delay: 0.1s">
                    <div class="text-5xl mb-4">💎</div>
                    <h2 class="text-2xl font-bold text-purple-700 mb-2">石头消消看</h2>
                    <p class="text-gray-600">经典的消除游戏，考验你的全局规划能力。</p>
                </div>
                
                <!-- Placeholder for future games -->
                <div class="bg-gray-100 rounded-2xl border-4 border-dashed border-gray-300 p-8 opacity-60">
                    <div class="text-5xl mb-4 text-gray-400">❓</div>
                    <h2 class="text-2xl font-bold text-gray-400 mb-2">敬请期待</h2>
                    <p class="text-gray-400">更多训练游戏正在开发中...</p>
                </div>
            </div>
        </div>

        <!-- Puzzle Game View -->
        <div id="puzzle-game" class="hidden">
            <div class="flex items-center mb-8">
                <button onclick="showMenu()" class="text-blue-600 hover:text-blue-800 flex items-center">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    返回菜单
                </button>
                <h1 class="text-3xl font-bold text-blue-800 flex-grow text-center">自由拼图</h1>
            </div>

            <div id="setup-area" class="max-w-xl mx-auto bg-white rounded-2xl shadow-lg p-8 animate__animated animate__fadeInUp">
                <div class="mb-8">
                    <label class="block text-gray-700 text-sm font-bold mb-2">1. 上传图片</label>
                    <div class="flex items-center justify-center w-full">
                        <label id="drop-zone" class="flex flex-col items-center justify-center w-full h-64 border-2 border-blue-300 border-dashed rounded-lg cursor-pointer bg-blue-50 hover:bg-blue-100 transition-colors">
                            <div class="flex flex-col items-center justify-center pt-5 pb-6">
                                <svg id="upload-icon" class="w-10 h-10 mb-3 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12"></path>
                                </svg>
                                <p id="upload-text" class="mb-2 text-sm text-blue-500 font-semibold">点击或拖拽上传图片</p>
                                <p class="text-xs text-blue-400">支持 JPG, PNG (推荐 1:1 或 4:3 比例)</p>
                            </div>
                            <input id="image-input" type="file" class="hidden" accept="image/*" />
                            <img id="image-preview" class="hidden w-full h-full object-contain rounded-lg p-2" />
                        </label>
                    </div>
                </div>

                <div class="mb-8">
                    <label class="block text-gray-700 text-sm font-bold mb-2">2. 选择难度 (分片数量)</label>
                    <div class="grid grid-cols-4 gap-4">
                        <button onclick="setDifficulty(16)" class="difficulty-btn px-4 py-2 rounded-lg bg-blue-100 text-blue-700 hover:bg-blue-200 font-bold transition-colors active" data-pieces="16">16</button>
                        <button onclick="setDifficulty(32)" class="difficulty-btn px-4 py-2 rounded-lg bg-blue-100 text-blue-700 hover:bg-blue-200 font-bold transition-colors" data-pieces="32">32</button>
                        <button onclick="setDifficulty(64)" class="difficulty-btn px-4 py-2 rounded-lg bg-blue-100 text-blue-700 hover:bg-blue-200 font-bold transition-colors" data-pieces="64">64</button>
                        <button onclick="setDifficulty(128)" class="difficulty-btn px-4 py-2 rounded-lg bg-blue-100 text-blue-700 hover:bg-blue-200 font-bold transition-colors" data-pieces="128">128</button>
                    </div>
                </div>

                <button id="start-btn" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transform transition active:scale-95 disabled:bg-gray-400 disabled:cursor-not-allowed" disabled>
                    开始拼图
                </button>
            </div>

            <!-- Game Board Area -->
            <div id="game-board-area" class="hidden flex flex-col items-center">
                <div class="mb-4 flex gap-4 text-lg font-semibold text-blue-800">
                    <div>难度: <span id="current-difficulty">16</span> 片</div>
                    <div>步数: <span id="moves">0</span></div>
                    <div>用时: <span id="timer">00:00</span></div>
                </div>
                
                <div id="puzzle-container" class="bg-white p-2 rounded-xl shadow-2xl overflow-hidden relative" style="width: min(90vw, 500px); height: min(90vw, 500px);">
                    <!-- Puzzle pieces will be generated here -->
                </div>

                <div class="mt-8 flex gap-4">
                    <button id="hint-btn" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-6 rounded-lg shadow transform transition active:scale-95">
                        查看原图
                    </button>
                    <button onclick="resetPuzzle()" class="bg-orange-500 hover:bg-orange-600 text-white font-bold py-2 px-6 rounded-lg shadow transform transition active:scale-95">
                        重新开始
                    </button>
                    <button onclick="showSetup()" class="bg-gray-500 hover:bg-gray-600 text-white font-bold py-2 px-6 rounded-lg shadow transform transition active:scale-95">
                        换张图片
                    </button>
                </div>
            </div>
        </div>

        <!-- Stone Match Game View -->
        <div id="stone-game" class="hidden">
            <div class="flex items-center mb-6">
                <button onclick="showMenu()" class="text-purple-600 hover:text-purple-800 flex items-center font-bold">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18" />
                    </svg>
                    返回
                </button>
                <h1 class="text-3xl font-bold text-purple-800 flex-grow text-center">石头消消看</h1>
            </div>

            <div class="max-w-4xl mx-auto flex flex-col md:flex-row gap-8 items-start justify-center">
                <!-- Game Board -->
                <div class="bg-white p-4 rounded-2xl shadow-2xl relative">
                    <div id="stone-container" class="grid bg-purple-100 rounded-lg overflow-hidden border-4 border-purple-300 shadow-inner" style="width: min(90vw, 450px); height: min(90vw, 450px);">
                        <!-- Stones will be generated here -->
                    </div>
                </div>

                <!-- Info Panel -->
                <div class="w-full md:w-64 bg-white p-6 rounded-2xl shadow-xl flex flex-col gap-4">
                    <div class="text-center p-3 bg-purple-50 rounded-xl border-2 border-purple-100">
                        <div class="text-gray-500 text-sm font-bold uppercase tracking-wider">当前得分</div>
                        <div id="stone-score" class="text-4xl font-black text-purple-600">0</div>
                    </div>
                    
                    <div class="text-center p-3 bg-orange-50 rounded-xl border-2 border-orange-100">
                        <div class="text-gray-500 text-sm font-bold uppercase tracking-wider">目标分数</div>
                        <div id="stone-target" class="text-3xl font-black text-orange-500">1000</div>
                    </div>

                    <div class="grid grid-cols-2 gap-3">
                        <div class="text-center p-2 bg-blue-50 rounded-xl border-2 border-blue-100">
                            <div class="text-gray-400 text-xs font-bold">关卡</div>
                            <div id="stone-stage" class="text-xl font-bold text-blue-600">1</div>
                        </div>
                        <div class="text-center p-2 bg-green-50 rounded-xl border-2 border-green-100">
                            <div class="text-gray-400 text-xs font-bold">剩余</div>
                            <div id="stone-remain" class="text-xl font-bold text-green-600">0</div>
                        </div>
                    </div>

                    <div class="mt-4 flex flex-col gap-3">
                        <button onclick="initStoneGame()" class="w-full bg-purple-600 hover:bg-purple-700 text-white font-bold py-3 rounded-xl shadow-lg transform transition active:scale-95">
                            重新开始
                        </button>
                    </div>

                    <div class="mt-4 p-4 bg-gray-50 rounded-xl text-xs text-gray-500 border border-gray-100 leading-relaxed">
                        <strong class="text-gray-700 block mb-1">玩法说明：</strong>
                        点击 2 个或以上相邻的同色石头即可消除。消除越多得分越高！完成目标分数即可过关。
                    </div>
                </div>
            </div>
        </div>

        <!-- Hint Overlay -->
        <div id="hint-overlay" class="fixed inset-0 bg-black bg-opacity-70 hidden items-center justify-center z-40" onclick="hideHint()">
            <div class="max-w-2xl max-h-[80vh] p-4 bg-white rounded-xl relative">
                <img id="hint-image" class="max-w-full max-h-[70vh] object-contain rounded-lg" />
                <p class="text-center mt-4 text-blue-800 font-bold">点击任意位置关闭提示</p>
            </div>
        </div>
    </div>

    <!-- Success Modal -->
    <div id="success-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white p-8 rounded-2xl shadow-2xl text-center animate__animated animate__bounceIn">
            <div class="text-6xl mb-4">🏆</div>
            <h2 class="text-3xl font-bold text-blue-800 mb-2">拼图成功！</h2>
            <p class="text-gray-600 mb-6 text-lg">太棒了！你的记忆力和耐心都很好。</p>
            <div class="mb-6">
                <p>总步数: <span id="final-moves" class="font-bold">0</span></p>
                <p>总用时: <span id="final-time" class="font-bold">00:00</span></p>
            </div>
            <div class="flex flex-col gap-3">
                <button onclick="showSetup()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-8 rounded-xl shadow-lg transition transform active:scale-95">
                    继续上传图片
                </button>
                <button onclick="showMenu()" class="text-blue-500 font-semibold hover:underline">
                    返回菜单
                </button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
