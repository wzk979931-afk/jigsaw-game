<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>防彦美老年痴呆训练</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            text-align: center;
            background: white;
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            width: 100%;
        }
        h1 {
            color: #333;
            font-size: 32px;
            margin-bottom: 50px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
        }
        .game-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .game-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 30px;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .game-card:nth-child(2) {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
        }
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
        }
        .game-card h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        .game-card p {
            font-size: 16px;
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🧠 防彦美老年痴呆训练</h1>
        <div class="game-list">
            <a href="puzzle.html" class="game-card">
                <h2>游戏 1：自由拼图</h2>
                <p>上传图片，选择难度，挑战拼图乐趣</p>
            </a>
            <a href="numbers.html" class="game-card">
                <h2>游戏 2：数字消消乐</h2>
                <p>运用加减符号，消除相同数字石头</p>
            </a>
        </div>
    </div>
</body>
</html>
